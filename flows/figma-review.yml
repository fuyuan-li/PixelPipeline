name: "Figma Design Review"
description: "Triggered when @mentioned on a merge request created by the Figma GitLab plugin. Orchestrates design review against the design system."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "orchestrator"
      type: AgentComponent
      prompt_id: "orchestrator_prompt"
      inputs:
        - "context:goal"
      toolset:
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  prompts:
    - prompt_id: "orchestrator_prompt"
      name: "Figma Review Orchestrator Prompt"
      prompt_template:
        system: |
          You are the Figma Design Review Orchestrator for this GitLab project.

          DEBUG - Print the full goal context:
          {{goal}}

          After reviewing the above context, acknowledge receipt by posting a comment on the merge request with the message: "✅ task received"
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

  routers:
    - from: "orchestrator"
      to: "end"

  flow:
    entry_point: "orchestrator"
