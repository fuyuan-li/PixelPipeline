name: "Figma Design System Migration"
description: |
  Triggered when @mentioned on a merge request created by the Figma GitLab plugin.

  This pipeline performs a Design System Migration review:
  it reads the committed Figma export, semantically infers what each element IS
  (button, nav bar, list item, divider, etc.) regardless of whether it is already
  a library component or a raw shape, then maps every element to the equivalent
  component in the target design system (e.g. MD3).

  Two cases handled:
    1. Node is already an INSTANCE  → read mainComponentName to identify it,
       find the equivalent component in the target DS, flag for replacement.
    2. Node is a raw FRAME / GROUP / RECTANGLE  → infer semantic type from
       dimensions, name keywords, and child structure, then map to the target DS.

  The output is a machine-readable Fix Spec that the Figma CI plugin applies
  as property-level patches, updating the exported design toward the target
  design system without requiring a Figma library component key.
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "intake"
      type: AgentComponent
      prompt_id: "intake_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

    - name: "component_classifier"
      type: AgentComponent
      prompt_id: "component_classifier_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

    - name: "component_patch_planner"
      type: AgentComponent
      prompt_id: "component_patch_planner_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

    - name: "migration_writer"
      type: AgentComponent
      prompt_id: "migration_writer_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_commit
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

  routers:
    - from: "intake"
      to: "component_classifier"
    - from: "component_classifier"
      to: "component_patch_planner"
    - from: "component_patch_planner"
      to: "migration_writer"
    - from: "migration_writer"
      to: "end"

  flow:
    entry_point: "intake"

  prompts:
    # ──────────────────────────────────────────────────────────────────────────
    # 1. INTAKE
    # ──────────────────────────────────────────────────────────────────────────
    - prompt_id: "intake_prompt"
      name: "Intake"
      prompt_template:
        system: |
          You are the Intake agent for the Design System Migration pipeline.

          Step 1: Parse merge_request_iid from goal context:
            Goal looks like: "... Context: {MergeRequest IID: N}"
            Extract N as the merge_request_iid.

          Step 2: Call get_merge_request (project_id, merge_request_iid).
            Confirm the MR exists. Note source_branch and merge request description.

          Step 3: Use the fixed output folder `demo`.
            Ignore any `<SAVE_FOLDER>` marker in the goal text.

          Step 4: Call create_merge_request_note with body:
            "⏳ Design system migration analysis started…"

          Step 5: Output below, with no markdown fence:
            - "status": "started"
            - "source_branch": "<source_branch>"
            - "save_folder": "demo"

          Do NOT ask the user for anything.
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 60

    # ──────────────────────────────────────────────────────────────────────────
    # 2. COMPONENT CLASSIFIER
    #    This is the core agent. It reads every node in the Figma export and
    #    determines:
    #      (a) What semantic component type this node IS
    #      (b) Which component in the target DS best matches it
    #    Then writes demo/component-migration-plan.json.
    # ──────────────────────────────────────────────────────────────────────────
    - prompt_id: "component_classifier_prompt"
      name: "Component Classifier"
      prompt_template:
        system: |
          You classify exported Figma nodes into semantic UI elements and map them to the target design system.

          Fixed paths:
            def get_file_path(filename):
                return "demo/" + filename

          Steps:
            1. Parse merge_request_iid from Goal and call get_merge_request. Save source_branch.
            2. Read get_file_path("cache/ds-catalog.json") with ref=source_branch.
            3. List get_file_path("figma-export"), pick the newest figma-export-*.json, then read it with ref=source_branch.
            4. Traverse all nodes recursively and build migrations[].
            5. Commit get_file_path("component-migration-plan.json") on source_branch.
               Use list_repository_tree(path="demo", ref=source_branch) first.
               If the file exists use action "update", otherwise use "create".

          Ownership pre-pass:
            - For each RECTANGLE/FRAME, attach overlapping sibling TEXT nodes whose center lies inside the surface.
            - Also attach small sibling icon-like nodes (INSTANCE, FRAME, VECTOR, BOOLEAN_OPERATION) if <= 40x40 and inside or within 8px.
            - Attached text/icon nodes belong to the larger surface and must not be classified separately.
            - If 2+ similar siblings align in a row/column, treat them as repeated components.
            - A larger surface enclosing repeated items is usually a Container, not another item.

          Classification:
            - CASE A: INSTANCE. Use mainComponentName as source_component. Migrate all instances, even if already close.
            - CASE B: infer from size, name, owned text/icons, reactions, sibling patterns, and position.
            - App Bar: wide top surface, height 56-96, header/title/back/menu signal.
            - Container: RECTANGLE/FRAME >= 240x140 enclosing repeated controls/content, not the top-level canvas.
            - Elevated Card: name contains card, or roughly 220-340 wide and 56-140 high with owned text/icon or repeated stack.
            - Checkbox: roughly square 16-40 with checkbox/check/tick naming or owned checkmark icon.
            - Button: name contains button/btn/cta/action, or 72-240 wide and 40-72 high with owned label.
            - Divider: LINE or height <= 4.
            - Navigation Bar: full-width nav/tab bar, usually 56-96 high with icons/text.
            - List Item: row-like item >= 200 wide and 48-88 high with text and list/item/song/row pattern.
            - Reactions are high-confidence signals. ON_CLICK + NAVIGATE usually means interactive control.

          Skip:
            - Top-level device frame/canvas
            - Pure TEXT nodes
            - Owned accessory nodes already attached to a larger surface
            - Nodes already a perfect target-DS instance

          Mapping:
            - If ds-catalog components exist, prefer:
              App Bar -> md.comp.app-bar
              Button -> md.comp.button
              Checkbox -> md.comp.checkbox
              Elevated Card -> md.comp.elevated-card
              Container -> token mode, target_component_id=null, target_component_name="Container"
            - Otherwise use exact name, partial name, then token hints from component tokens.
            - Never upcast a text-labeled button to icon-button variants.
            - If only tokens exist, use target_mode="token", target_component_id=null, and infer only conservative properties:
              fills, strokes, textColor, fontSize, cornerRadius
            - Never infer layout structure in token mode.

          Capture on each migration:
            node_id, node_name, node_type, case, semantic_type, inference_reason,
            source_component, target_mode, target_component_id, target_component_name,
            inferred_tokens, confidence, current_properties, child_text_node_id, child_icon_node_id.

          current_properties must include:
            fills, strokes, cornerRadius, width, height, fontSize, itemSpacing, padding.

          Output JSON:
            {
              "generated_at": "...",
              "target_design_system": "...",
              "summary": {
                "total_nodes_scanned": 0,
                "existing_instances": 0,
                "raw_shapes_inferred": 0,
                "elements_to_migrate": 0
              },
              "migrations": [...]
            }

          Confidence values: high, medium, low.
          Be exhaustive.
          Final answer must include:
            save_folder:demo
            debug_output_path:<computed path>
            full ds_catalog_path:<exact path read>
            full export_dir:<exact path listed>
            actual_output_path:<exact committed path>
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

    # ──────────────────────────────────────────────────────────────────────────
    # 3. COMPONENT PATCH PLANNER
    #    Expands matched DS components into normalized property patches and
    #    writes the patch plan consumed by the migration writer.
    #    Reads only migration-plan.json + ds-catalog.json — no figma export.
    # ──────────────────────────────────────────────────────────────────────────
    - prompt_id: "component_patch_planner_prompt"
      name: "Component Patch Planner"
      prompt_template:
        system: |
          Convert migration recommendations into conservative property-level patches.

          Fixed paths:
            def get_file_path(filename):
                return "demo/" + filename

          Inputs:
            - demo/component-migration-plan.json
            - demo/cache/ds-catalog.json
            Do not read the Figma export again.

          Steps:
            1. Parse merge_request_iid and call get_merge_request. Save source_branch.
            2. Read get_file_path("component-migration-plan.json") with ref=source_branch.
            3. Read get_file_path("cache/ds-catalog.json") with ref=source_branch.
            4. Build patch_sets[].
            5. Commit get_file_path("component-patch-plan.json") on source_branch.
               Use list_repository_tree(path="demo", ref=source_branch) first.
               If the file exists use "update", else "create".

          Normalize token values:
            - px -> number
            - rem -> px using 1rem = 16
            - colors -> hex

          Property mapping:
            - container-color, active-indicator-color -> fills
            - outline-color -> strokes
            - label-text-color -> textColor on text child
            - icon-color -> fills on icon child
            - container-height -> height
            - container-width -> width
            - container-shape -> cornerRadius
            - label-text-size -> fontSize on text child
            - leading-space/trailing-space -> padding.left/padding.right
            - top-space/bottom-space -> padding.top/padding.bottom

          Token-mode mapping:
            fills, strokes, textColor, fontSize, cornerRadius only.
            Never emit width, height, padding, or itemSpacing in token mode.

          Patch scope:
            - root: migration.node_id
            - text: migration.child_text_node_id
            - icon: migration.child_icon_node_id

          Rules:
            - Emit a patch only when new_value differs from old_value.
            - Root old_value comes from migration.current_properties.
            - Child old_value may be null.
            - Never create/delete/reorder nodes.
            - Skip values that cannot be normalized cleanly.
            - severity = warning for high confidence, else error.
            - If mapping is too unclear, emit zero patches for that migration.

          Output JSON:
            {
              "generated_at": "...",
              "target_design_system": "...",
              "summary": {
                "migrations_seen": 0,
                "components_matched": 0,
                "components_missing": 0,
                "patches_planned": 0
              },
              "patch_sets": [...]
            }

          Final answer must include:
            component-migration-plan.json:<exact path read>
            ds-catalog.json:<exact path read>
            save_folder:demo
            commit file path:<computed path>
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

    # ──────────────────────────────────────────────────────────────────────────
    # 4. MIGRATION WRITER
    #    Reads the component patch plan, generates the machine-readable fix spec
    #    for the Figma plugin, and posts the human-readable MR summary comment.
    # ──────────────────────────────────────────────────────────────────────────
    - prompt_id: "migration_writer_prompt"
      name: "Migration Writer"
      prompt_template:
        system: |
          Build the final fix spec and MR summary comment.

          Fixed paths:
            def get_file_path(filename):
                return "demo/" + filename
            debug_output_path = get_file_path("figma-fix-spec.json")

          Steps:
            1. Parse merge_request_iid and call get_merge_request. Save source_branch.
            2. Read get_file_path("component-patch-plan.json") with ref=source_branch.
            3. Build:
               {
                 "generated_at": "...",
                 "mr_iid": <iid>,
                 "source_branch": "<source_branch>",
                 "summary": <copy patch-plan summary>,
                 "fixes": <copy patch_sets>
               }
            4. Commit get_file_path("figma-fix-spec.json") on source_branch.
               Use list_repository_tree(path="demo", ref=source_branch) first.
               If the file exists use "update", else "create".
            5. Post an MR comment with:
               - title "Design System Migration Preview"
               - target design system
               - table of detected elements and planned patch properties
               - confidence badges for high/medium/low
               - summary counts
               - plugin instruction to open Apply Fixes
               If there are no patches, post:
               "✅ No property patches were needed. The exported design already matches the target design system closely enough."

          Include all patch_sets, including medium and low confidence.
          Final answer must include:
            save_folder:demo
            output_path:<computed path>
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120
