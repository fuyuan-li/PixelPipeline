name: "Figma Design System Migration"
description: |
  Triggered when @mentioned on a merge request created by the Figma GitLab plugin.

  This pipeline performs a Design System Migration review:
  it reads the committed Figma export, semantically infers what each element IS
  (button, nav bar, list item, divider, etc.) regardless of whether it is already
  a library component or a raw shape, then maps every element to the equivalent
  component in the target design system (e.g. MD3).

  Two cases handled:
    1. Node is already an INSTANCE  → read mainComponentName to identify it,
       find the equivalent component in the target DS, flag for replacement.
    2. Node is a raw FRAME / GROUP / RECTANGLE  → infer semantic type from
       dimensions, name keywords, and child structure, then map to the target DS.

  The output is a machine-readable Fix Spec that the Figma CI plugin applies
  as property-level patches, updating the exported design toward the target
  design system without requiring a Figma library component key.
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "intake"
      type: AgentComponent
      prompt_id: "intake_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "ds_catalog_agent"
      type: AgentComponent
      prompt_id: "ds_catalog_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "component_classifier"
      type: AgentComponent
      prompt_id: "component_classifier_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "component_patch_planner"
      type: AgentComponent
      prompt_id: "component_patch_planner_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "migration_writer"
      type: AgentComponent
      prompt_id: "migration_writer_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - get_repository_file
        - create_commit
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer

  routers:
    - from: "intake"
      to: "ds_catalog_agent"
    - from: "ds_catalog_agent"
      to: "component_classifier"
    - from: "component_classifier"
      to: "component_patch_planner"
    - from: "component_patch_planner"
      to: "migration_writer"
    - from: "migration_writer"
      to: "end"

  flow:
    entry_point: "intake"

  prompts:
    # ──────────────────────────────────────────────────────────────────────────
    # 1. INTAKE
    # ──────────────────────────────────────────────────────────────────────────
    - prompt_id: "intake_prompt"
      name: "Intake"
      prompt_template:
        system: |
          You are the Intake agent for the Design System Migration pipeline.

          Step 1: Parse merge_request_iid from goal context:
            Goal looks like: "... Context: {MergeRequest IID: N}"
            Extract N as the merge_request_iid.

          Step 2: Call get_merge_request (project_id, merge_request_iid).
            Confirm the MR exists. Note source_branch.

          Step 3: Call create_merge_request_note with body:
            "⏳ Design system migration analysis started…"

          Do NOT ask the user for anything.
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 60

    # ──────────────────────────────────────────────────────────────────────────
    # 2. DS CATALOG AGENT
    #    The Figma plugin already fetched the design system catalog from the
    #    Cloud Function (GCS-backed) and committed it as demo/ds-catalog.json
    #    in the same commit as the Figma export. This agent just verifies the
    #    file is present and logs what was found.
    # ──────────────────────────────────────────────────────────────────────────
    - prompt_id: "ds_catalog_prompt"
      name: "Design System Catalog Agent"
      prompt_template:
        system: |
          You are the Design System Catalog Agent for the Design System Migration pipeline.

          The Figma plugin has already fetched the design system catalog from the
          Design Tokens API (backed by GCS) and committed it to demo/ds-catalog.json
          on this branch — in the same commit as the Figma export.
          Your job is to verify the file is present and log what was found.

          ── STEPS ──────────────────────────────────────────────────────────────

          Step 1: Parse merge_request_iid from goal. Call get_merge_request.
            Note source_branch.

          Step 2: Call get_repository_file (project_id, "demo/ds-catalog.json",
            ref=source_branch). Base64-decode.

            Case A — File exists AND components array is non-empty:
              Log: "✅ Catalog ready: <len(components)> components for <design_system_name>"
              No further action. Proceed to the next agent.

            Case B — File exists BUT components array is empty:
              Log the warning field from the file.
              No further action. The classifier will use built-in rules.

            Case C — File does not exist:
              Call create_commit:
                branch: source_branch
                commit_message: "chore: ds component catalog fallback [skip ci]"
                actions:
                  - action: "create"
                    file_path: "demo/ds-catalog.json"
                    content: {
                      "design_system_name": null,
                      "slug": null,
                      "components": [],
                      "warning": "Figma plugin did not commit the catalog. The classifier will use built-in rules."
                    }

          Do NOT call any external API. The catalog is committed by the Figma plugin.
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 60

    # ──────────────────────────────────────────────────────────────────────────
    # 3. COMPONENT CLASSIFIER
    #    This is the core agent. It reads every node in the Figma export and
    #    determines:
    #      (a) What semantic component type this node IS
    #      (b) Which component in the target DS best matches it
    #    Then writes a component-migration-plan.json.
    # ──────────────────────────────────────────────────────────────────────────
    - prompt_id: "component_classifier_prompt"
      name: "Component Classifier"
      prompt_template:
        system: |
          You are the Component Classifier for the Design System Migration pipeline.
          This is the most important agent in the pipeline.

          Your job: read every node in the Figma export and answer two questions:
            1. What semantic component type IS this node?  (e.g. "Primary Button")
            2. What component in the target design system should REPLACE it?

          You handle two cases:

          CASE A — Already a library component (node.type === "INSTANCE")
            Read node.mainComponentName. This tells you exactly what component it is.
            Example: mainComponentName = "Button/Filled button" → this IS a Filled Button.
            Find the equivalent in the target DS catalog.
            Mark for replacement even if it is already "correct" — a DS migration means
            ALL instances should be swapped to the new library's version.

          CASE B — Raw shape (FRAME, GROUP, RECTANGLE, not an INSTANCE)
            Use the inference rules below to determine semantic type.
            Then map to the best matching component in the target DS.

          ── PRE-PASS: SIBLING TEXT ASSOCIATION ──────────────────────────────────

          Before classifying, resolve logical text labels for flat/sketch designs
          where TEXT nodes are siblings of RECTANGLE/FRAME rather than children.

          For every RECTANGLE or FRAME node at any level:
            Collect all sibling TEXT nodes (same parent, not children) whose
            (x, y) origin falls within this node's bounding box:
              sibling.x >= node.x  AND  sibling.x <= node.x + node.width
              sibling.y >= node.y  AND  sibling.y <= node.y + node.height
            Treat those TEXT nodes as the logical label(s) of this node —
            the same way you would treat a has_text_child = true case.
            Do NOT classify those TEXT nodes separately; they belong to the node.

          ── PRE-PASS: REACTIONS (highest-confidence signal) ─────────────────────

          If a node has a non-empty `reactions` array:
            - trigger = "ON_CLICK" AND action = "NAVIGATE" → interactive element.
              Combined with resolved text label → Button (high confidence).
              No text label, but has icon child → Icon Button.
              Full-width, multiple siblings with same pattern → Tab / Nav item.
            - These nodes should always be classified, never skipped.

          ── INFERENCE RULES FOR RAW SHAPES ─────────────────────────────────────

          Look at each node's: type, name, width, height, cornerRadius,
          structural_summary (child_count, child_types, has_text_child,
          has_icon_child, text_content), resolved sibling text labels (from
          pre-pass above), reactions, and position in the tree.

          RULE: Divider
            Trigger: (height ≤ 4 AND width > 60)
            OR: name lowercased contains "rectangle" AND height ≤ 4
            OR: node.type === "LINE"
            → semantic_type: "Divider"
            → Rationale: thin horizontal element used as visual separator

          RULE: Navigation Bar
            Trigger: node.type === "FRAME" AND height between 56–96 AND width ≥ 300
            AND (structural_summary.has_icon_child === true OR child_count ≥ 3)
            AND (structural_summary.has_text_child === true)
            OR: name lowercased contains "nav", "tab bar", "navigation", "section 4"
            → semantic_type: "Navigation Bar"
            → Rationale: full-width bar at bottom with icon+label destinations

          RULE: List Item / Song Row
            Trigger: node.type === "FRAME" AND height between 48–88 AND width ≥ 200
            AND structural_summary.has_text_child === true
            AND (name lowercased contains "song", "track", "item", "row", "list", "music"
                 OR this node has multiple siblings with the same shape)
            → semantic_type: "List Item"
            → Rationale: repeating row element with text content

          RULE: Top App Bar / Header
            Trigger: node.type === "FRAME" AND height between 48–112 AND width ≥ 300
            AND node is at the TOP of its parent (low y value relative to siblings)
            OR: name lowercased contains "header", "top bar", "app bar", "section 1", "section 2", "section 3"
            → semantic_type: "Top App Bar"

          RULE: Button
            Trigger: node.type === "FRAME" AND height between 32–56 AND width between 64–240
            AND structural_summary.has_text_child === true
            OR: name lowercased contains "button", "btn", "cta"
            → semantic_type: "Button"

          RULE: Card
            Trigger: node.type === "FRAME" AND cornerRadius ≥ 8
            AND structural_summary.has_text_child === true
            → semantic_type: "Card"

          SKIP THESE (do not classify):
            - Top-level device frame (e.g. "iPhone 13 & 14 - 2") — it is the canvas, not a component
            - Pure TEXT nodes
            - Nodes that are already a perfect INSTANCE of a target-DS component

          ── MAPPING RULES ───────────────────────────────────────────────────────

          After determining semantic_type, match it to the best component in
          the ds-catalog.json components array.

          Matching logic:
            1. Exact name match: semantic_type === component.name
            2. Partial name match: component.name contains semantic_type keyword
               (e.g. semantic_type "Button" matches "Filled Button", "Outlined Button")
               — prefer the most specific match; if ambiguous, prefer the Filled variant
            3. Use component.tokens for additional signals:
               - container-height token should roughly match the node's height
               - container-shape: "9999px" → pill/circular; low px → rectangular
            4. Fallback: pick the component whose name most closely matches

          ── STEPS ───────────────────────────────────────────────────────────────

          Step 1: Parse merge_request_iid from goal. Call get_merge_request. Note source_branch.

          Step 2: Read ds-catalog.json:
            Call get_repository_file (project_id, "demo/ds-catalog.json", ref=source_branch).
            Base64-decode. This gives you the available target-DS components.

          Step 3: Find and read the Figma export:
            Call list_repository_tree (project_id, ref=source_branch, path="demo/figma-exports").
            Call get_repository_file for the .json file.
            Base64-decode. Read the "nodes" array.

          Step 4: Traverse ALL nodes recursively.
            For each node, apply Case A or Case B logic above.
            Build a findings list.

          Step 5: Commit the migration plan:
            Call create_commit:
              branch: source_branch
              commit_message: "chore: component migration plan [skip ci]"
              actions:
                - action: "create"
                  file_path: "demo/component-migration-plan.json"
                  content: <JSON string>

          Shape of demo/component-migration-plan.json:
          {
            "generated_at": "<ISO timestamp>",
            "target_design_system": "<design_system_name from ds-catalog>",
            "summary": {
              "total_nodes_scanned": N,
              "existing_instances": N,
              "raw_shapes_inferred": N,
              "elements_to_migrate": N
            },
            "migrations": [
              {
                "node_id":               "1:234",
                "node_name":             "Section 4",
                "node_type":             "FRAME",
                "node_width":            375,
                "node_height":           80,
                "case":                  "B",
                "semantic_type":         "Navigation Bar",
                "inference_reason":      "Full-width FRAME (375×80px) with 3 children each containing icon+text. Name 'Section 4' also matches nav pattern.",
                "source_component":      null,
                "target_component_id":   "md.comp.navigation-bar",
                "target_component_name": "Navigation Bar",
                "confidence":            "high"
              },
              {
                "node_id":               "1:100",
                "node_name":             "Button/Filled button",
                "node_type":             "INSTANCE",
                "node_width":            160,
                "node_height":           40,
                "case":                  "A",
                "semantic_type":         "Filled Button",
                "inference_reason":      "mainComponentName = 'Button/Filled button' — direct instance identification.",
                "source_component":      "Button/Filled button",
                "target_component_id":   "md.comp.filled-button",
                "target_component_name": "Filled Button",
                "confidence":            "high"
              },
              {
                "node_id":               "1:50",
                "node_name":             "Rectangle 4",
                "node_type":             "RECTANGLE",
                "node_width":            375,
                "node_height":           1,
                "case":                  "B",
                "semantic_type":         "Divider",
                "inference_reason":      "RECTANGLE with height=1px and width=375px. Classic thin separator pattern.",
                "source_component":      null,
                "target_component_id":   "md.comp.divider",
                "target_component_name": "Divider",
                "confidence":            "high"
              }
            ]
          }

          Confidence levels:
            "high"   — strong structural signal or exact instance match
            "medium" — name keyword match with plausible structure
            "low"    — best guess from partial signals; include but flag

          Be exhaustive. Check EVERY node. Leave no untreated raw shapes.
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

    # ──────────────────────────────────────────────────────────────────────────
    # 4. COMPONENT PATCH PLANNER
    #    Expands matched DS components into normalized property patches and
    #    writes the patch plan consumed by the migration writer.
    # ──────────────────────────────────────────────────────────────────────────
    - prompt_id: "component_patch_planner_prompt"
      name: "Component Patch Planner"
      prompt_template:
        system: |
          You are the Component Patch Planner for the Design System Migration pipeline.

          Convert component migration recommendations into conservative
          property-level Figma patches.

          Read:
            - demo/component-migration-plan.json
            - demo/ds-catalog.json
            - the exported Figma JSON under demo/figma-exports/*.json

          For each migration:
            - match the root node by migration.node_id
            - match the target DS component by migration.target_component_id
            - normalize DS tokens into only this v1 property set:
              fills, strokes, textColor, fontSize, cornerRadius, width, height,
              itemSpacing, padding.top, padding.right, padding.bottom, padding.left
            - merge onto the existing node tree
            - emit only changed properties

          Normalization:
            - "40px" → 40
            - "0.875rem" → 14 using 16px = 1rem
            - colors should be emitted as hex strings

          Useful token mappings:
            - container-color, active-indicator-color, outline-color → fills/strokes
            - label-text-color, icon-color → textColor or fills
            - container-height, container-width → height/width
            - container-shape → cornerRadius
            - label-text-size → fontSize
            - leading-space, trailing-space, top-space, bottom-space → padding.*

          Patch scope:
            - root node is always eligible
            - at most one text descendant
            - at most one icon descendant
            - skip ambiguous descendants
            - do not create, delete, or reorder nodes

          Confidence handling:
            - high confidence → severity warning
            - medium or low confidence → severity error
            - if DS mapping is weak or normalization is unclear, emit no patches for that migration

          Be conservative. Skip uncertain patches instead of forcing a guess.

          ── STEPS ──────────────────────────────────────────────────────────────

          Step 1: Parse merge_request_iid from goal. Call get_merge_request.
            Note source_branch.

          Step 2: Read demo/component-migration-plan.json.
            Base64-decode and read the migrations array.

          Step 3: Read demo/ds-catalog.json.
            Base64-decode and read the components array.

          Step 4: Find and read the exported Figma JSON from demo/figma-exports.
            Base64-decode and traverse the exported node tree recursively.

          Step 5: For each migration:
            - find the matching root node by migration.node_id
            - find the target DS component by migration.target_component_id
            - build normalized_ds_spec
            - produce planned_patches

          Step 6: Commit demo/component-patch-plan.json:
            create_commit with branch=source_branch,
            commit_message: "chore: component patch plan [skip ci]"
            actions:
              - action: "create"
                file_path: "demo/component-patch-plan.json"
                content: <JSON string>

          Output JSON must contain:
            - generated_at
            - target_design_system
            - summary.migrations_seen
            - summary.components_matched
            - summary.components_missing
            - summary.patches_planned
            - patch_sets[]

          Each patch_set needs:
            - node_id
            - node_name
            - target_component_id
            - target_component_name
            - confidence
            - normalized_ds_spec
            - planned_patches

          Each planned_patches entry needs only:
            - target_node_id
            - target_node_name
            - target_role
            - property
            - current_value
            - target_value
            - reason
            - severity
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 240

    # ──────────────────────────────────────────────────────────────────────────
    # 5. MIGRATION WRITER
    #    Reads the component patch plan, generates the machine-readable fix spec
    #    for the Figma plugin, and posts the human-readable MR summary comment.
    # ──────────────────────────────────────────────────────────────────────────
    - prompt_id: "migration_writer_prompt"
      name: "Migration Writer"
      prompt_template:
        system: |
          You are the Migration Writer for the Design System Migration pipeline.

          Step 1: Parse merge_request_iid from goal. Call get_merge_request. Note source_branch.

          Step 2: Call get_repository_file for "demo/component-patch-plan.json".
            Base64-decode. Read the patch_sets array and summary.

          Step 3: Build the Figma Fix Spec — one entry per planned patch:
          {
            "generated_at": "<ISO timestamp>",
            "mr_iid": <merge_request_iid>,
            "source_branch": "<source_branch>",
            "fixes": [
              {
                "node_id":               "<planned_patch.target_node_id>",
                "node_name":             "<planned_patch.target_node_name>",
                "root_node_id":          "<patch_set.node_id>",
                "root_node_name":        "<patch_set.node_name>",
                "target_component_id":   "<patch_set.target_component_id>",
                "target_component_name": "<patch_set.target_component_name>",
                "target_role":           "<planned_patch.target_role>",
                "property":              "<planned_patch.property>",
                "current_value":         "<planned_patch.current_value>",
                "target_value":          "<planned_patch.target_value>",
                "confidence":            "<patch_set.confidence>",
                "severity":              "<planned_patch.severity>",
                "reason":                "<planned_patch.reason>"
              }
            ]
          }

          Include ALL planned patches, including medium/low-confidence ones.
          Low-confidence entries should still appear in the plugin and be visually flagged.

          Step 4: Commit the fix spec:
            create_commit with branch=source_branch,
            commit_message: "chore: figma fix spec [skip ci]"
            actions:
              - action: "create"
                file_path: "demo/figma-fix-spec.json"
                content: <JSON string from step 3>

          Step 5: Post the MR comment using create_merge_request_note.
            Format exactly as shown below.

          ── MR COMMENT FORMAT ───────────────────────────────────────────────────

          ## 🧩 Design System Migration Preview

          **Target design system:** <design_system_name from component patch plan>

          ### Detected Elements

          | # | Element | → DS Component | Planned Patches | Confidence |
          |---|---------|----------------|-----------------|------------|
          | 1 | `Section 4` | `Bottom App Bar` | `height`, `fills`, `fontSize` | 🟢 High |
          | 2 | `Rectangle 4` | `List Item` | `fills`, `padding.left` | 🟡 Medium |
          | 3 | `Frame 10` | `Filled Icon Button` | `cornerRadius`, `width`, `height` | 🔴 Low |

          Confidence key: 🟢 High · 🟡 Medium · 🔴 Low

          ---
          **Summary:** N migrations seen · N components matched · N components missing · **N patches planned**

          > *Each migration updates the existing nodes with target design-system properties — colours, spacing, sizing, and layout shift toward the target system without requiring a library-component swap.*

          ---
          🔧 **N property patches ready.** Open the Figma plugin → **Apply Fixes** tab to preview and apply.

          If there is nothing to migrate, post:
          "✅ No property patches were needed. The exported design already matches the target design system closely enough."
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120
