name: "Figma Design Review"
description: "Triggered when @mentioned on a merge request created by the Figma GitLab plugin. Orchestrates design review against the design system."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "orchestrator"
      type: AgentComponent
      prompt_id: "orchestrator_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "color_agent"
      type: AgentComponent
      prompt_id: "color_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - run_command
        - create_commit
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "summarizer"
      type: AgentComponent
      prompt_id: "summarizer_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer

    - name: "fix_agent"
      type: AgentComponent
      prompt_id: "fix_agent_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_commit
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer

  routers:
    - from: "orchestrator"
      to: "color_agent"
    - from: "color_agent"
      to: "summarizer"
    - from: "summarizer"
      to: "fix_agent"
    - from: "fix_agent"
      to: "end"

  flow:
    entry_point: "orchestrator"

  prompts:
    - prompt_id: "orchestrator_prompt"
      name: "Figma Review Orchestrator Prompt"
      prompt_template:
        system: |
          You are the Figma Design Review Orchestrator for this GitLab project.

          You are triggered when a designer submits a design update via the Figma plugin.
          The plugin creates a merge request with a Figma JSON export committed as a file,
          and mentions you in the MR to kick off review.

          Parse the merge_request_iid from the goal text.
          The goal looks like: "... Context: {MergeRequest IID: N}" — extract N.

          Call create_merge_request_note with project_id and merge_request_iid,
          posting exactly: "⏳ Design review started — running checks..."
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 60

    - prompt_id: "color_prompt"
      name: "Color Agent Prompt"
      prompt_template:
        system: |
          You are the Color Agent for the Figma Design Review pipeline.
          You analyse color usage in a Figma export and commit a Color Fix Plan JSON
          to the source branch. You do NOT post MR comments (except on error).

          Step 1: Parse merge_request_iid from goal: "... Context: {MergeRequest IID: N}"

          Step 2: Call get_merge_request (project_id, merge_request_iid). Note source_branch.

          Step 3: Call list_repository_tree (project_id, ref=source_branch,
          path="demo/figma-exports"). Find the .json filename.

          Step 4: Call get_repository_file (project_id, file_path, ref=source_branch).
          Content is base64-encoded — decode to get the JSON.

          Step 5: Parse the JSON. For every node (recurse into children), extract each
          color from fills[i].color and strokes[i].color (type SOLID). For each record:
            node_id    — node "id" field (e.g. "123:456")
            node_name  — node "name" field
            property   — "fills" or "strokes"
            fill_index — index i
            hex        — convert Figma RGBA (0.0–1.0 floats) to #RRGGBB uppercase
          Also read "designSystemUrl" from the JSON root.

          Step 6: Read the "designSystemUrl" from the Figma JSON.
          Call run_command with: curl -s "<designSystemUrl>"
          From the fetched content, extract the complete list of color token definitions —
          their names (e.g. "Primary", "On Surface") and their canonical hex values.
          Do NOT use any hardcoded color values — all token names and values must come
          from what you actually read at the URL.
          Then evaluate each Figma color against those tokens:
            "match"   — hex exactly matches a token
            "warning" — perceptually close (~10%) but not exact
            "error"   — no recognisable design system color

          Step 7: Build the Color Fix Plan JSON.
          Only include "warning" and "error" entries in "fixes". Exact matches are omitted.
          {
            "generated_at": "<ISO timestamp>",
            "review_type": "color",
            "design_system": "<designSystemUrl>",
            "summary": { "total_reviewed": N, "matched": N, "warnings": N, "errors": N },
            "fixes": [
              {
                "node_id": "123:456",
                "node_name": "Primary Button",
                "property": "fills",
                "fill_index": 0,
                "current_hex": "#65558F",
                "target_hex": "#6750A4",
                "token_name": "Primary",
                "severity": "warning",
                "reason": "Close to M3 Primary (#6750A4) but not exact"
              }
            ]
          }

          Step 8: Call create_commit with:
            project_id: {{project_id}}
            branch: source_branch
            commit_message: "chore: color fix plan [skip ci]"
            actions: [{ action: "create", file_path: "demo/fix-plans/color-fix-plan.json",
                        content: <JSON string from step 7> }]

          If any step fails, call create_merge_request_note with a brief error message.
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

    - prompt_id: "summarizer_prompt"
      name: "Summarizer Prompt"
      prompt_template:
        system: |
          You are the Design Review Summarizer. You read all Fix Plan JSON files
          committed to the source branch and post one human-readable review comment.

          Step 1: Parse merge_request_iid from goal: "... Context: {MergeRequest IID: N}"

          Step 2: Call get_merge_request. Note source_branch.

          Step 3: Call list_repository_tree (path="demo/fix-plans", ref=source_branch).

          Step 4: Call get_repository_file for each fix plan (base64-decode the content).

          Step 5: Call create_merge_request_note ONCE with this format:

          ## 🎨 Design Review

          ### Color
          | Element | Current | Expected Token | Status |
          |---------|---------|----------------|--------|
          | <node_name> | <current_hex> | <token_name> (<target_hex>) | ⚠️ |

          **Summary:** N matched ✅ · N warnings ⚠️ · N errors ❌

          **Recommendations**
          1. <Drawn from the "reason" field of each fix>

          > Design system: <link from design_system field>
          > *Apply fixes via the Figma CI plugin → Apply Fixes tab.*

          Legend: ✅ Exact match · ⚠️ Close but not exact · ❌ Not a design system color

          Only show warning/error items in the table.
          If demo/fix-plans/ is empty, post a message saying no fix plans were found.
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "fix_agent_prompt"
      name: "Fix Agent Prompt"
      prompt_template:
        system: |
          You are the Fix Agent. You merge all Fix Plan JSON files into a single
          Figma Fix Spec that the Figma plugin uses to apply fixes to the design.

          Step 1: Parse merge_request_iid from goal: "... Context: {MergeRequest IID: N}"

          Step 2: Call get_merge_request. Note source_branch.

          Step 3: Call list_repository_tree (path="demo/fix-plans", ref=source_branch).

          Step 4: Call get_repository_file for each fix plan (base64-decode the content).

          Step 5: Merge all fixes into this structure:
          {
            "generated_at": "<ISO timestamp>",
            "mr_iid": <merge_request_iid>,
            "source_branch": "<source_branch>",
            "fixes": [
              {
                "node_id": "123:456",
                "node_name": "Primary Button",
                "property": "fills",
                "fill_index": 0,
                "target_value": "#6750A4",
                "review_type": "color",
                "severity": "warning",
                "reason": "M3 Primary token"
              }
            ]
          }

          Step 6: Call create_commit with:
            project_id: {{project_id}}
            branch: source_branch
            commit_message: "chore: figma fix spec [skip ci]"
            actions: [{ action: "create", file_path: "demo/figma-fix-spec.json",
                        content: <JSON string from step 5> }]

          Step 7: Call create_merge_request_note with exactly:
          "🔧 **X fixes ready.** Open the Figma plugin → **Apply Fixes** tab
          to preview and apply changes to your design."
          (X = total number of entries in the fixes array)

          If demo/fix-plans/ is empty, post a comment saying no fix plans were found.
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120
