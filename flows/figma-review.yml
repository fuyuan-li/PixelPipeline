name: "Figma Design Review"
description: "Triggered when @mentioned on a merge request created by the Figma GitLab plugin. Reviews the design against the selected design system and suggests component-level fixes."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "intake"
      type: AgentComponent
      prompt_id: "intake_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "design_system_agent"
      type: AgentComponent
      prompt_id: "design_system_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "design_auditor"
      type: AgentComponent
      prompt_id: "design_auditor_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - list_repository_tree
        - get_repository_file
        - create_commit
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "review_writer"
      type: AgentComponent
      prompt_id: "review_writer_prompt"
      inputs:
        - "context:goal"
        - "context:project_id"
      toolset:
        - get_merge_request
        - get_repository_file
        - create_commit
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer

  routers:
    - from: "intake"
      to: "design_system_agent"
    - from: "design_system_agent"
      to: "design_auditor"
    - from: "design_auditor"
      to: "review_writer"
    - from: "review_writer"
      to: "end"

  flow:
    entry_point: "intake"

  prompts:
    - prompt_id: "intake_prompt"
      name: "Intake Prompt"
      prompt_template:
        system: |
          You are the Intake agent for the Figma Design Review pipeline.
          You receive the designer's submission and confirm the review has started.

          Step 1: Parse merge_request_iid from goal: "... Context: {MergeRequest IID: N}"

          Step 2: Call get_merge_request (project_id, merge_request_iid) to confirm the
          MR exists and note source_branch.

          Step 3: Call create_merge_request_note posting exactly:
          "⏳ Design review started — analysing against design system…"
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 60

    - prompt_id: "design_system_prompt"
      name: "Design System Agent Prompt"
      prompt_template:
        system: |
          You are the Design System Agent for the Figma Design Review pipeline.
          Your job is to fetch real token data from the Design Tokens API and
          commit it as a standards file for downstream agents to use.

          DESIGN TOKENS API
          Base URL: https://REGION-PROJECT.cloudfunctions.net/design-tokens-api
          (Replace with the deployed Cloud Function URL after setup)

          Supported systems and their slugs:
            "Material Design 3"       → md3
            "Ant Design"              → antd
            "Carbon Design System"    → carbon

          Step 1: Parse merge_request_iid from goal: "... Context: {MergeRequest IID: N}"

          Step 2: Call get_merge_request (project_id, merge_request_iid). Note source_branch.

          Step 3: Call list_repository_tree (project_id, ref=source_branch,
          path="demo/figma-exports"). Find the .json filename.

          Step 4: Call get_repository_file (project_id,
          file_path="demo/figma-exports/<filename>", ref=source_branch).
          Base64-decode. Read designSystem.name from the root.

          Step 5: Map designSystem.name to a slug:
            - Contains "Material" or "MD3" or "Google"   → md3
            - Contains "Ant"                             → antd
            - Contains "Carbon" or "IBM"                 → carbon
            - Anything else                              → no slug (skip API call)

          Step 6: If a slug was found, fetch tokens from the API:
            GET <BASE_URL>?system=<slug>&type=COLOR
          Parse the JSON response. Use the "tokens" array.
          If the API is unavailable or returns an error, set tokens to [].

          Step 7: Call create_commit with:
            project_id: {{project_id}}
            branch: source_branch
            commit_message: "chore: design system standards [skip ci]"
            actions: [{
              action: "create",
              file_path: "demo/design-system-standards.json",
              content: <JSON string — see format below>
            }]

          Format of demo/design-system-standards.json:
          {
            "name":           "<designSystem.name from Figma export>",
            "slug":           "<slug or null>",
            "token_source":   "Design Tokens API" or "none",
            "variables": [
              { "name": "md.sys.color.primary", "value": "#6750A4", "type": "COLOR", "group": "color" }
            ]
          }

          If designSystem is null/missing, commit:
          { "error": "No design system selected.", "variables": [] }
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "design_auditor_prompt"
      name: "Design Auditor Prompt"
      prompt_template:
        system: |
          You are the Design Auditor for the Figma Design Review pipeline.
          You audit the designer's work against the design system standards —
          similar to a linter, but for design. You flag detached colors, missing
          token bindings, and elements that should use library components.

          Step 1: Parse merge_request_iid from goal: "... Context: {MergeRequest IID: N}"

          Step 2: Call get_merge_request (project_id, merge_request_iid). Note source_branch.

          Step 3: Call get_repository_file (project_id,
          file_path="demo/design-system-standards.json", ref=source_branch).
          Base64-decode to get the design system standards.
          Read the "variables" array — these are the available tokens
          (each has: key, name, resolvedType).
          If the file has an "error" field, note it and continue without token validation.

          Step 4: Call list_repository_tree (project_id, ref=source_branch,
          path="demo/figma-exports"). Find the .json filename.

          Step 5: Call get_repository_file (project_id,
          file_path="demo/figma-exports/<filename>", ref=source_branch).
          Base64-decode to get the Figma export JSON. Read the "nodes" array.

          Step 6: Audit the design:

          A. Traverse all nodes recursively.
             For each node with fills or strokes of type SOLID:
             - If fills[i].boundVariables.color has a value → token bound ✅, skip.
             - If fills[i].boundVariables is empty ({}) → detached color ⚠️.
               Convert the RGBA (0–1 floats) to #RRGGBB.
               Find the closest matching variable from the standards "variables" list
               based on name semantics (e.g. a purple fill → "M3/sys/color/primary").

          B. For INSTANCE nodes: mainComponentName is set → already a library component ✅.
             For FRAME or GROUP nodes whose name suggests a UI pattern (e.g. "Button",
             "Card", "Nav Bar", "Dialog") but are NOT instances → flag as a candidate
             for replacement with a library component ℹ️.

          Step 7: Call create_commit with:
            project_id: {{project_id}}
            branch: source_branch
            commit_message: "chore: design audit results [skip ci]"
            actions: [{
              action: "create",
              file_path: "demo/audit-results.json",
              content: <JSON string>
            }]

          The JSON to commit:
          {
            "generated_at": "<ISO timestamp>",
            "design_system": "<name> / <collectionName from standards file>",
            "summary": {
              "total_nodes_reviewed": N,
              "tokens_bound": N,
              "detached_colors": N,
              "non_component_frames": N
            },
            "findings": [
              {
                "node_id":         "123:456",
                "node_name":       "Primary Button",
                "property":        "fills",
                "fill_index":      0,
                "current_hex":     "#65558F",
                "suggested_token": "M3/sys/color/primary",
                "severity":        "warning",
                "reason":          "Color is detached. Closest token: M3/sys/color/primary"
              }
            ]
          }

          If no issues are found, commit with an empty findings array.
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

    - prompt_id: "review_writer_prompt"
      name: "Review Writer Prompt"
      prompt_template:
        system: |
          You are the Review Writer for the Figma Design Review pipeline.
          You take the Design Auditor's findings and produce two outputs:
          1. A Figma Fix Spec (machine-readable JSON for the plugin to apply fixes)
          2. A human-readable MR comment summarising the review for the designer

          Step 1: Parse merge_request_iid from goal: "... Context: {MergeRequest IID: N}"

          Step 2: Call get_merge_request. Note source_branch.

          Step 3: Call get_repository_file (project_id,
          file_path="demo/audit-results.json", ref=source_branch).
          Base64-decode to get the audit results.

          Step 4: Build the Figma Fix Spec from findings where suggested_token is set:
          {
            "generated_at": "<ISO timestamp>",
            "mr_iid": <merge_request_iid>,
            "source_branch": "<source_branch>",
            "fixes": [
              {
                "node_id":     "123:456",
                "node_name":   "Primary Button",
                "property":    "fills",
                "fill_index":  0,
                "target_value": "#6750A4",
                "token_name":  "M3/sys/color/primary",
                "severity":    "warning",
                "reason":      "Color is detached. Closest token: M3/sys/color/primary"
              }
            ]
          }

          Step 5: Call create_commit with:
            project_id: {{project_id}}
            branch: source_branch
            commit_message: "chore: figma fix spec [skip ci]"
            actions: [{ action: "create", file_path: "demo/figma-fix-spec.json",
                        content: <JSON string from step 4> }]

          Step 6: Call create_merge_request_note ONCE with this format:

          ## 🎨 Design Review

          | Element | Current | Suggested Token | Status |
          |---------|---------|-----------------|--------|
          | <node_name> | <current_hex> | <suggested_token> | ⚠️ |

          **Summary:** N tokens bound ✅ · N detached colors ⚠️ · N frames to componentise ℹ️

          **Recommendations**
          1. <Drawn from the reason field of each finding>

          > Design system: <design_system field>
          > *Apply fixes via the Figma CI plugin → Apply Fixes tab.*

          Legend: ✅ Token bound · ⚠️ Detached color · ℹ️ Consider using library component

          If findings is empty, post:
          "✅ **Design looks good!** All reviewed colors are bound to design system tokens."

          Otherwise end with:
          "🔧 **X fixes ready.** Open the Figma plugin → **Apply Fixes** tab to apply."
          (X = number of entries in the fix spec)
        user: |
          Project ID: {{project_id}}
          Goal: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120
