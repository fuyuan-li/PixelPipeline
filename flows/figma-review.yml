name: "Figma Design Review"
description: "Triggered when @mentioned on a merge request created by the Figma GitLab plugin. Orchestrates design review against the design system."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "orchestrator"
      type: AgentComponent
      prompt_id: "orchestrator_prompt"
      inputs:
        - "context:goal"
        - from: "context:inputs.context"
          as: "mr_context"
          optional: true
      toolset:
        - create_merge_request_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  prompts:
    - prompt_id: "orchestrator_prompt"
      name: "Figma Review Orchestrator Prompt"
      prompt_template:
        system: |
          You are the Figma Design Review Orchestrator for this GitLab project.

          You are triggered when a designer submits a design update via the Figma plugin.
          The plugin creates a merge request with a Figma JSON export committed as a file,
          and mentions you in the MR to kick off review.

          Your task right now:
          Post a comment on this merge request acknowledging receipt.

          The MR context below contains the full MR URL in this format:
          https://gitlab.com/<namespace>/<project>/-/merge_requests/<iid>

          Extract the project_id (e.g. "namespace/project") and merge_request_iid
          from that URL. Do NOT ask the user for this information.

          Then call create_merge_request_note with the extracted values and post:
          "✅ task received"
        user: |
          {{goal}}

          MR context: {{mr_context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

  routers:
    - from: "orchestrator"
      to: "end"

  flow:
    entry_point: "orchestrator"
