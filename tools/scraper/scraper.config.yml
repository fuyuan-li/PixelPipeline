# Design System Token Scraper — configuration
# =============================================
# Specify which design systems to scrape.
# Valid values: md3, carbon, atlassian
#
# CLI flags override this file:
#   python main.py --systems md3 carbon atlassian   (overrides 'systems' below)
#   python main.py --dry-run                        (overrides 'dry_run' below)

systems:
  - md3
  - carbon
  - atlassian

bucket: figma-design-tokens-gitlab-hackathon-figma

# Set to true to write JSON locally to ./output/ instead of uploading to GCS
dry_run: false
