<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    color: #1a1a1a;
    background: #fff;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid #e8e8e8;
    background: #fafafa;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    color: #999;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
  }
  .tab.active { color: #18a0fb; border-bottom-color: #18a0fb; }
  .tab:hover:not(.active) { color: #555; }

  /* ── Panels ── */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* ── Form elements ── */
  label {
    display: block;
    font-size: 11px;
    color: #666;
    margin-bottom: 4px;
    margin-top: 10px;
  }
  label:first-of-type { margin-top: 0; }

  input[type="text"],
  input[type="password"],
  select {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    font-size: 12px;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
    background: #fff;
  }
  input:focus, select:focus { border-color: #18a0fb; box-shadow: 0 0 0 2px rgba(24,160,251,0.15); }
  select:disabled { color: #aaa; background: #f5f5f5; }

  .library-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .library-row select { flex: 1; }
  .refresh-btn {
    flex-shrink: 0;
    padding: 6px 8px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    background: #fafafa;
    font-size: 11px;
    cursor: pointer;
    color: #555;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: #e8e8e8; }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 11px;
    color: #888;
    cursor: pointer;
    user-select: none;
  }
  .checkbox-row input { width: auto; cursor: pointer; }

  hr { border: none; border-top: 1px solid #f0f0f0; margin: 14px 0; }

  /* ── Buttons ── */
  .btn {
    width: 100%;
    padding: 9px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 14px;
    transition: background 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-primary { background: #18a0fb; color: white; }
  .btn-primary:hover:not(:disabled) { background: #0d8de3; }
  .btn-primary:disabled { background: #a8d8fb; cursor: not-allowed; }
  .btn-success { background: #1a7f37; color: white; }
  .btn-success:hover:not(:disabled) { background: #136127; }
  .btn-success:disabled { background: #8fcca3; cursor: not-allowed; }

  /* ── Status line ── */
  .status {
    margin-top: 10px;
    font-size: 11px;
    color: #888;
    min-height: 18px;
    line-height: 1.6;
    word-break: break-word;
  }
  .status.success { color: #1a7f37; }
  .status.error   { color: #cf222e; }

  .hint { font-size: 10px; color: #aaa; margin-top: 3px; }
  a { color: #18a0fb; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Fix list ── */
  .fix-list {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 240px;
    overflow-y: auto;
  }

  .fix-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    background: #fafafa;
  }
  .fix-item input[type="checkbox"] { margin-top: 2px; cursor: pointer; flex-shrink: 0; }
  .fix-item-body { flex: 1; min-width: 0; }
  .fix-item-name {
    font-weight: 600;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fix-item-detail {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  .color-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
  }
  .fix-arrow { color: #aaa; font-size: 10px; }
  .fix-hex { font-size: 10px; font-family: monospace; color: #555; }
  .fix-reason { font-size: 10px; color: #aaa; margin-top: 2px; }

  .severity-warning { border-left: 3px solid #e6a817; }
  .severity-error   { border-left: 3px solid #cf222e; }

  .fix-summary {
    font-size: 11px;
    color: #666;
    margin-top: 8px;
  }
  .fix-summary strong { color: #1a1a1a; }

  .empty-state {
    text-align: center;
    padding: 24px 16px;
    color: #aaa;
    font-size: 11px;
    line-height: 1.7;
  }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('submit')">⬡ Submit Review</div>
  <div class="tab"        onclick="switchTab('apply')">🔧 Apply Fixes</div>
</div>

<!-- ══════════════════════════════════════════════════════════ SUBMIT TAB -->
<div class="panel active" id="panel-submit">

  <label>Project Path</label>
  <input type="text" id="projectPath" placeholder="namespace/project-name" />

  <label>Base Branch</label>
  <input type="text" id="baseBranch" placeholder="main" />

  <label>Design System</label>
  <select id="librarySelect" onchange="onLibraryChange()">
    <option value="">— Select a design system —</option>
    <optgroup label="Supported">
      <option value="Material Design 3">Material Design 3 (Google)</option>
      <option value="Carbon Design System">Carbon Design System (IBM)</option>
      <option value="Atlassian Design System">Atlassian Design System</option>
    </optgroup>
    <optgroup label="Variable Collections" id="varCollectionsGroup" style="display:none"></optgroup>
  </select>
  <div class="hint" id="libraryHint"></div>

  <hr>

  <label>GitLab Personal Access Token</label>
  <input type="password" id="token" placeholder="glpat-xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
  <div class="hint">Needs <code>api</code> scope. Never stored in source code.</div>

  <label class="checkbox-row">
    <input type="checkbox" id="rememberToken">
    Remember token (saved in Figma's local storage on this machine)
  </label>

  <button class="btn btn-primary" id="createBtn" onclick="createMR()">🚀 Create MR &amp; Start Review</button>
  <div class="status" id="submitStatus"></div>

</div>

<!-- ══════════════════════════════════════════════════════════ APPLY TAB -->
<div class="panel" id="panel-apply">

  <label>Review Branch</label>
  <input type="text" id="reviewBranch" placeholder="figma/review-…" />
  <div class="hint">Auto-filled after you submit a review. Or paste the source branch name.</div>

  <button class="btn btn-primary" id="loadBtn" onclick="loadFixes()" style="margin-top:10px">
    Load Fixes
  </button>

  <div id="fixContent">
    <div class="empty-state">
      Load a review branch to see suggested fixes.<br>
      Fixes are generated by the Fix Agent after review completes.
    </div>
  </div>

  <div class="status" id="applyStatus"></div>

</div>

<script>
  // ─── constants ────────────────────────────────────────────────────────────
  const GITLAB_BASE_URL    = 'https://gitlab.com';
  const FLOW_ACCOUNT       = 'ai-figma-design-review-gitlab-ai-hackathon';
  const DESIGN_TOKENS_API  = 'https://design-tokens-api-sdzot2fiaq-uc.a.run.app';

  // ─── library state ────────────────────────────────────────────────────────
  let savedLibraryName = '';

  // ─── tab switching ────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (name === 'submit'));
    });
    document.getElementById('panel-submit').classList.toggle('active', name === 'submit');
    document.getElementById('panel-apply').classList.toggle('active', name === 'apply');
  }

  // ─── helpers ──────────────────────────────────────────────────────────────
  function setStatus(id, text, cls) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'status ' + (cls || '');
  }
  function setStatusHTML(id, html, cls) {
    const el = document.getElementById(id);
    el.innerHTML = html;
    el.className = 'status ' + (cls || '');
  }

  // ─── library helpers ──────────────────────────────────────────────────────

  function onLibraryChange() {}

  // 1:1 mapping from dropdown display name → API slug.
  // Keep in sync with: gcloud/functions/design-tokens-api/main.py VALID_SLUGS
  const DESIGN_SYSTEM_SLUG_MAP = {
    'Material Design 3':       'md3',
    'Carbon Design System':    'carbon',
    'Atlassian Design System': 'atlassian',
  };

  // Returns the canonical design-system name to send to the agent.
  function getSelectedLibraryName() {
    return document.getElementById('librarySelect').value || null;
  }

  function getSelectedLibrary() {
    const name = getSelectedLibraryName();
    if (!name) return null;
    const slug = DESIGN_SYSTEM_SLUG_MAP[name] ?? null;
    return { key: null, name: name, libraryName: name, slug: slug, type: 'named' };
  }

  function getSubmitValues() {
    const lib = getSelectedLibrary();
    return {
      projectPath:         document.getElementById('projectPath').value.trim(),
      baseBranch:          document.getElementById('baseBranch').value.trim() || 'main',
      selectedLibrary:     lib,
      selectedLibraryName: lib ? lib.name : '',
      token:               document.getElementById('token').value.trim(),
      rememberToken:       document.getElementById('rememberToken').checked,
    };
  }

  // Called on init and on refresh — adds any variable-collection libraries
  // from the API as extra options in the dropdown (bonus, not required).
  function populateLibraryDropdown(libraries) {
    const group = document.getElementById('varCollectionsGroup');
    group.innerHTML = '';
    if (libraries && libraries.length > 0) {
      group.style.display = '';
      libraries.forEach(function(lib) {
        const opt = document.createElement('option');
        opt.value = lib.libraryName;   // use the name, not the key
        opt.textContent = lib.libraryName + ' / ' + lib.name + ' (variable tokens)';
        group.appendChild(opt);
      });
      document.getElementById('libraryHint').textContent =
        libraries.length + ' variable collection' + (libraries.length !== 1 ? 's' : '') + ' also available above.';
    } else {
      group.style.display = 'none';
      document.getElementById('libraryHint').textContent = '';
    }
    // Restore saved selection if it matches one of the options.
    if (savedLibraryName) {
      const sel = document.getElementById('librarySelect');
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === savedLibraryName) {
          sel.selectedIndex = i;
          return;
        }
      }
    }
  }

  function refreshLibraries() {
    document.getElementById('libraryHint').textContent = 'Refreshing…';
    parent.postMessage({ pluginMessage: { type: 'get-available-libraries' } }, '*');
  }

  // ─── receive messages from code.js ───────────────────────────────────────
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'init') {
      const s = msg.settings;
      document.getElementById('projectPath').value  = s.projectPath;
      document.getElementById('baseBranch').value   = s.baseBranch;
      document.getElementById('reviewBranch').value = s.lastReviewBranch;
      savedLibraryName = s.savedLibraryName || '';
      if (s.token) {
        document.getElementById('token').value           = s.token;
        document.getElementById('rememberToken').checked = true;
      }
    }

    if (msg.type === 'available-libraries') {
      if (msg.error) {
        document.getElementById('libraryHint').textContent =
          '⚠️ Could not load libraries: ' + msg.error;
      }
      populateLibraryDropdown(msg.libraries || []);
    }

    if (msg.type === 'figma-export') {
      runGitLabFlow(msg.payload);
    }

    if (msg.type === 'export-error') {
      setStatus('submitStatus', '❌ Export failed: ' + msg.message, 'error');
      document.getElementById('createBtn').disabled = false;
    }

    if (msg.type === 'fixes-applied') {
      const applied = msg.results.filter(r => r.status === 'applied').length;
      const failedResults = msg.results.filter(r => r.status !== 'applied');
      const failed  = failedResults.length;
      const failureSummary = failed
        ? '<br><span style="color:#888">' + failedResults.slice(0, 3).map(formatFailureResult).join(' · ') + '</span>'
        : '';
      setStatusHTML('applyStatus',
        `✅ Applied ${applied} fix${applied !== 1 ? 'es' : ''}` +
        (failed ? ` · ${failed} could not be applied` : '') +
        failureSummary,
        'success'
      );
      document.getElementById('applyBtn') && (document.getElementById('applyBtn').disabled = false);
    }
  };

  // ─── SUBMIT: create MR flow ──────────────────────────────────────────────
  function createMR() {
    const v = getSubmitValues();
    if (!v.token)            { setStatus('submitStatus', '❌ Token is required.', 'error'); return; }
    if (!v.projectPath)      { setStatus('submitStatus', '❌ Project path is required.', 'error'); return; }
    if (!v.selectedLibrary)  { setStatus('submitStatus', '❌ Please select a design system.', 'error'); return; }

    document.getElementById('createBtn').disabled = true;
    setStatus('submitStatus', 'Exporting Figma data…');

    parent.postMessage({ pluginMessage: { type: 'save-settings', settings: v } }, '*');
    parent.postMessage({
      pluginMessage: {
        type:            'get-figma-export',
        selectedLibrary: v.selectedLibrary,
      }
    }, '*');
  }

  async function runGitLabFlow(figmaPayload) {
    const v   = getSubmitValues();
    const api = `${GITLAB_BASE_URL}/api/v4`;
    const h   = { 'Content-Type': 'application/json', 'PRIVATE-TOKEN': v.token };

    try {
      setStatus('submitStatus', '🔍 Resolving project…');
      const projRes = await fetch(`${api}/projects/${encodeURIComponent(v.projectPath)}`, { headers: h });
      if (!projRes.ok) throw new Error(`Project not found (${projRes.status})`);
      const project = await projRes.json();

      const ts           = new Date().toISOString().replace(/[:.]/g, '').slice(0, 15);
      const reviewBranch = `figma/review-${ts}`;

      // ── Fetch design system catalog from Cloud Function (GCS) ────────────
      const slug   = figmaPayload.designSystem?.slug  || null;
      const dsName = figmaPayload.designSystem?.name  || null;
      let dsCatalog;

      if (slug) {
        setStatus('submitStatus', `🎨 Fetching ${dsName} design tokens…`);
        try {
          const tokenRes = await fetch(`${DESIGN_TOKENS_API}?system=${slug}&resource=components`);
          if (tokenRes.ok) {
            const tokenData = await tokenRes.json();
            dsCatalog = {
              design_system_name: tokenData.system,
              slug:               tokenData.slug,
              components:         tokenData.components || [],
            };
            setStatus('submitStatus', `✅ Loaded ${dsCatalog.components.length} ${dsName} components`);
          } else {
            throw new Error(`HTTP ${tokenRes.status}`);
          }
        } catch (e) {
          setStatus('submitStatus', `⚠️ Could not fetch design tokens (${e.message}) — review will use built-in rules`);
          dsCatalog = {
            design_system_name: dsName,
            slug,
            components: [],
            warning: `Design Tokens API unavailable (${e.message}). The classifier will use built-in rules.`,
          };
        }
      } else {
        dsCatalog = {
          design_system_name: null,
          slug:               null,
          components:         [],
          warning:            'No design system selected. The classifier will use built-in rules.',
        };
      }

      setStatus('submitStatus', '🌿 Creating branch…');
      const branchRes = await fetch(`${api}/projects/${project.id}/repository/branches`, {
        method: 'POST', headers: h,
        body: JSON.stringify({ branch: reviewBranch, ref: v.baseBranch }),
      });
      if (!branchRes.ok) throw new Error(`Branch creation failed (${branchRes.status})`);

      const fileName      = `demo/figma-exports/${ts}.json`;
      const dsDisplayName = figmaPayload.designSystem
        ? `${figmaPayload.designSystem.libraryName || figmaPayload.designSystem.name} / ${figmaPayload.designSystem.collectionName || ''}`
        : '—';
      const varCount  = figmaPayload.designSystem?.variables?.length || 0;

      const commitMsg = [
        'chore: add Figma design snapshot for review',
        '',
        `Page: ${figmaPayload.document?.pageName || '—'}`,
        `Design System: ${dsDisplayName}`,
        `Variables exported: ${varCount}`,
      ].join('\n');

      setStatus('submitStatus', '📄 Committing Figma export + design tokens…');
      const fileRes = await fetch(
        `${api}/projects/${project.id}/repository/commits`,
        {
          method: 'POST', headers: h,
          body: JSON.stringify({
            branch:         reviewBranch,
            commit_message: commitMsg,
            actions: [
              {
                action:    'create',
                file_path: fileName,
                content:   JSON.stringify(figmaPayload, null, 2),
              },
              {
                action:    'create',
                file_path: 'demo/ds-catalog.json',
                content:   JSON.stringify(dsCatalog, null, 2),
              },
            ],
          }),
        }
      );
      if (!fileRes.ok) throw new Error(`Commit failed (${fileRes.status})`);

      const pageName    = figmaPayload.document?.pageName || 'Design';
      const description = [
        '## Figma Design Review',
        '',
        '> This MR was created automatically by the Figma plugin.',
        '',
        `| | |`,
        `|---|---|`,
        `| **Page** | ${pageName} |`,
        `| **Exported at** | ${figmaPayload.exportedAt} |`,
        `| **Design System** | ${dsDisplayName} (${varCount} variables) |`,
        `| **Snapshot** | \`${fileName}\` |`,
        '',
        `---`,
      ].join('\n');

      setStatus('submitStatus', '📬 Creating MR…');
      const mrRes = await fetch(`${api}/projects/${project.id}/merge_requests`, {
        method: 'POST', headers: h,
        body: JSON.stringify({
          source_branch: reviewBranch, target_branch: v.baseBranch,
          title: `[Figma Review] ${pageName} (${ts})`,
          description, labels: 'design-review', remove_source_branch: true,
        }),
      });
      if (!mrRes.ok) throw new Error(`MR creation failed (${mrRes.status})`);
      const mr = await mrRes.json();

      parent.postMessage({ pluginMessage: { type: 'save-review-ref', branch: reviewBranch, mrIid: mr.iid } }, '*');
      document.getElementById('reviewBranch').value = reviewBranch;

      setStatus('submitStatus', '🤖 Triggering review flow…');
      await fetch(`${api}/projects/${project.id}/merge_requests/${mr.iid}/notes`, {
        method: 'POST', headers: h,
        body: JSON.stringify({ body: `@${FLOW_ACCOUNT} please review this design update.` }),
      });

      setStatusHTML('submitStatus',
        `✅ MR <a href="${mr.web_url}" target="_blank">!${mr.iid} ↗</a> — review triggered!
         <br><span style="color:#aaa">Switch to Apply Fixes tab once the review is done.</span>`,
        'success'
      );

    } catch (err) {
      setStatus('submitStatus', '❌ ' + err.message, 'error');
    }

    document.getElementById('createBtn').disabled = false;
  }

  // ─── APPLY: load + apply fixes ───────────────────────────────────────────

  // loadedFixSets: grouped format from figma-fix-spec.json
  // displayItems:  flattened, one entry per patch, for rendering + selection
  let loadedFixSets = [];
  let displayItems  = [];

  // Flatten grouped fix sets into individual display items for the UI.
  // Each item carries both fix-set fields (node_id, target_component_name…)
  // and patch fields (property, old_value, new_value, severity…) merged flat.
  function flattenFixSets(fixSets) {
    const items = [];
    fixSets.forEach(function(fixSet) {
      (fixSet.patches || []).forEach(function(patch) {
        items.push({
          // fix-set level
          node_id:               fixSet.node_id,
          node_name:             fixSet.node_name,
          target_component_id:   fixSet.target_component_id,
          target_component_name: fixSet.target_component_name,
          confidence:            fixSet.confidence,
          // patch level
          target_node_id:        patch.target_node_id,
          target_node_name:      patch.target_node_name,
          target_role:           patch.target_role,
          property:              patch.property,
          old_value:             patch.old_value,
          new_value:             patch.new_value,
          severity:              patch.severity,
          reason:                patch.reason,
        });
      });
    });
    return items;
  }

  async function loadFixes() {
    const branch  = document.getElementById('reviewBranch').value.trim();
    const token   = document.getElementById('token').value.trim();
    const project = document.getElementById('projectPath').value.trim();

    if (!branch)  { setStatus('applyStatus', '❌ Branch name is required.', 'error'); return; }
    if (!token)   { setStatus('applyStatus', '❌ Token is required (fill in Submit tab).', 'error'); return; }
    if (!project) { setStatus('applyStatus', '❌ Project path is required (fill in Submit tab).', 'error'); return; }

    document.getElementById('loadBtn').disabled = true;
    setStatus('applyStatus', 'Fetching fix spec…');

    try {
      const api = `${GITLAB_BASE_URL}/api/v4`;
      const h   = { 'PRIVATE-TOKEN': token };

      const projRes = await fetch(`${api}/projects/${encodeURIComponent(project)}`, { headers: h });
      if (!projRes.ok) throw new Error(`Project not found (${projRes.status})`);
      const proj = await projRes.json();

      const filePath = encodeURIComponent('demo/figma-fix-spec.json');
      const specRes  = await fetch(
        `${api}/projects/${proj.id}/repository/files/${filePath}?ref=${encodeURIComponent(branch)}`,
        { headers: h }
      );

      if (specRes.status === 404) {
        document.getElementById('fixContent').innerHTML = `
          <div class="empty-state">
            No fix spec found on this branch yet.<br>
            The Fix Agent posts one after review completes —<br>watch for the 🔧 comment on your MR.
          </div>`;
        setStatus('applyStatus', '');
        return;
      }
      if (!specRes.ok) throw new Error(`Could not fetch fix spec (${specRes.status})`);

      const raw  = await specRes.json();
      const spec = JSON.parse(atob(raw.content));
      loadedFixSets = spec.fixes || [];
      displayItems  = flattenFixSets(loadedFixSets);

      renderFixList(displayItems);
      setStatus('applyStatus', '');

    } catch (err) {
      setStatus('applyStatus', '❌ ' + err.message, 'error');
    }

    document.getElementById('loadBtn').disabled = false;
  }

  function renderFixList(items) {
    if (!items.length) {
      document.getElementById('fixContent').innerHTML = `
        <div class="empty-state">No fixes suggested — your design looks good!</div>`;
      return;
    }

    const rows = items.map((item, i) => {
      const detail = formatFixDetail(item);
      // Show sub-node name if the patch targets a child (text/icon), otherwise just root name
      const title = (item.target_role !== 'root' && item.target_node_name && item.target_node_name !== item.node_name)
        ? `${item.node_name} / ${item.target_node_name}`
        : (item.node_name || item.node_id);
      const meta = [formatPropertyLabel(item.property), item.target_component_name, item.target_role !== 'root' ? item.target_role : null]
        .filter(Boolean)
        .join(' · ');

      return `
        <div class="fix-item severity-${item.severity || 'warning'}">
          <input type="checkbox" id="fix-${i}" checked data-index="${i}">
          <div class="fix-item-body">
            <div class="fix-item-name">${escHtml(title)}</div>
            <div class="fix-reason">${escHtml(meta)}</div>
            <div class="fix-item-detail">${detail}</div>
            <div class="fix-reason">${escHtml(item.reason || '')}</div>
          </div>
        </div>`;
    }).join('');

    const warnings = items.filter(f => f.severity === 'warning').length;
    const errors   = items.filter(f => f.severity === 'error').length;

    document.getElementById('fixContent').innerHTML = `
      <div class="fix-summary">
        <strong>${items.length} fix${items.length !== 1 ? 'es' : ''} suggested</strong>
        ${warnings ? ` · ${warnings} ⚠️` : ''}
        ${errors   ? ` · ${errors} ❌`   : ''}
      </div>
      <div class="fix-list">${rows}</div>
      <button class="btn btn-success" id="applyBtn" onclick="applySelected()">Apply Selected Fixes</button>`;
  }

  function applySelected() {
    const selectedItems = displayItems.filter((_, i) => {
      const cb = document.getElementById(`fix-${i}`);
      return cb && cb.checked;
    });

    if (!selectedItems.length) {
      setStatus('applyStatus', '⚠️ No fixes selected.', '');
      return;
    }

    // Re-group selected flat items back into grouped fix sets for code.js.
    const grouped = {};
    selectedItems.forEach(function(item) {
      if (!grouped[item.node_id]) {
        grouped[item.node_id] = {
          node_id:               item.node_id,
          node_name:             item.node_name,
          target_component_id:   item.target_component_id,
          target_component_name: item.target_component_name,
          confidence:            item.confidence,
          patches:               [],
        };
      }
      grouped[item.node_id].patches.push({
        target_node_id:   item.target_node_id,
        target_node_name: item.target_node_name,
        target_role:      item.target_role,
        property:         item.property,
        old_value:        item.old_value,
        new_value:        item.new_value,
        severity:         item.severity,
        reason:           item.reason,
      });
    });

    const fixSets = Object.values(grouped);
    document.getElementById('applyBtn').disabled = true;
    setStatus('applyStatus', `Applying ${selectedItems.length} fix${selectedItems.length !== 1 ? 'es' : ''}…`);
    parent.postMessage({ pluginMessage: { type: 'apply-fixes', fixes: fixSets } }, '*');
  }

  function isColorProperty(property) {
    return property === 'fills' || property === 'strokes' || property === 'textColor';
  }

  function formatPropertyLabel(property) {
    const labels = {
      fills: 'Fill',
      strokes: 'Stroke',
      textColor: 'Text color',
      fontSize: 'Font size',
      cornerRadius: 'Corner radius',
      width: 'Width',
      height: 'Height',
      resize: 'Resize',
      itemSpacing: 'Item spacing',
      layoutMode: 'Layout mode',
      primaryAxisSizingMode: 'Primary sizing',
      counterAxisSizingMode: 'Counter sizing',
    };
    if (labels[property]) return labels[property];
    if (property && property.startsWith('padding.')) {
      return `Padding ${property.split('.')[1]}`;
    }
    return property || 'Property';
  }

  function formatScalar(value) {
    if (value === null || value === undefined || value === '') return '?';
    if (typeof value === 'object') return escHtml(JSON.stringify(value));
    return escHtml(String(value));
  }

  function formatFixDetail(fix) {
    const current = formatScalar(fix.old_value);
    const target  = formatScalar(fix.new_value);
    if (isColorProperty(fix.property)) {
      const swatchColor = typeof fix.new_value === 'string' ? fix.new_value : '#ccc';
      return `
        <span class="color-swatch" style="background:${escHtml(swatchColor)}"></span>
        <span class="fix-hex">${current}</span>
        <span class="fix-arrow">→</span>
        <span class="fix-hex">${target}</span>`;
    }
    return `
      <span class="fix-hex">${escHtml(formatPropertyLabel(fix.property))}</span>
      <span class="fix-arrow">:</span>
      <span class="fix-hex">${current}</span>
      <span class="fix-arrow">→</span>
      <span class="fix-hex">${target}</span>`;
  }

  function formatFailureResult(result) {
    const name = escHtml(result.node_name || result.node_id || 'node');
    const property = escHtml(formatPropertyLabel(result.property));
    const status = escHtml(result.status || 'error');
    return `${name} (${property}: ${status})`;
  }

  function escHtml(str) {
    return String(str).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])
    );
  }
</script>
</body>
</html>
