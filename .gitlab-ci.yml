stages:
  - prepare

include:
  - component: $CI_SERVER_FQDN/components/ai-catalog/sync@~latest

# ──────────────────────────────────────────────────────────────────────────────
# fetch-design-tokens
#
# Runs on every MR pipeline. Reads the committed Figma export, extracts the
# design system slug, calls the Design Tokens Cloud Function, and commits the
# resulting component catalog as demo/ds-catalog.json on the source branch.
#
# The downstream AI agent flow reads this file instead of calling the API
# directly — keeping the GCS/Cloud Function in the hot path while working
# around the GitLab agent toolset's lack of an external HTTP tool.
# ──────────────────────────────────────────────────────────────────────────────
fetch-design-tokens:
  stage: prepare
  image: alpine:3.19
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - apk add --no-cache curl jq git
    - git config user.email "ci-bot@gitlab.com"
    - git config user.name "GitLab CI Bot"
    - git remote set-url origin
        "https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - mkdir -p demo
    - |
      # ── 1. Locate the Figma export ──────────────────────────────────────────
      EXPORT_FILE=$(find demo/figma-exports -name "*.json" 2>/dev/null | head -1)
      if [ -z "$EXPORT_FILE" ]; then
        echo "⚠️  No Figma export found in demo/figma-exports/ — skipping"
        exit 0
      fi
      echo "📄 Figma export: $EXPORT_FILE"

      # ── 2. Extract design system info ───────────────────────────────────────
      SLUG=$(jq -r '.designSystem.slug // empty' "$EXPORT_FILE")
      DS_NAME=$(jq -r '.designSystem.name // "Unknown"' "$EXPORT_FILE")
      echo "🎨 Design system: $DS_NAME  (slug: ${SLUG:-<none>})"

      # ── 3. Fetch catalog from Cloud Function → GCS ─────────────────────────
      if [ -z "$SLUG" ]; then
        echo "⚠️  No slug found — writing empty catalog"
        echo '{
          "design_system_name": null,
          "slug": null,
          "components": [],
          "warning": "No design system slug found in Figma export."
        }' > demo/ds-catalog.json

      else
        API_URL="https://design-tokens-api-sdzot2fiaq-uc.a.run.app?system=${SLUG}&resource=components"
        echo "🌐 Calling: $API_URL"

        HTTP_CODE=$(curl -s -o /tmp/api-response.json -w "%{http_code}" "$API_URL")

        if [ "$HTTP_CODE" = "200" ]; then
          # Reshape to the format the classifier expects
          jq '{
            design_system_name: .system,
            slug:               .slug,
            components:         .components
          }' /tmp/api-response.json > demo/ds-catalog.json

          COUNT=$(jq '.components | length' demo/ds-catalog.json)
          echo "✅ Fetched $COUNT components for $DS_NAME"

        else
          echo "⚠️  API returned HTTP $HTTP_CODE — writing empty catalog with warning"
          jq -n \
            --arg name "$DS_NAME" \
            --arg slug "$SLUG" \
            --arg code "$HTTP_CODE" \
            '{
              design_system_name: $name,
              slug:               $slug,
              components:         [],
              warning: ("Design Tokens API returned HTTP " + $code + ". The classifier will use built-in rules.")
            }' > demo/ds-catalog.json
        fi
      fi

      # ── 4. Commit and push ─────────────────────────────────────────────────
      git add demo/ds-catalog.json
      if git diff --staged --quiet; then
        echo "ℹ️  ds-catalog.json unchanged — no commit needed"
      else
        git commit -m "chore: fetch design tokens catalog [skip ci]"
        git push origin "HEAD:${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
        echo "🚀 Pushed ds-catalog.json to ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
      fi
